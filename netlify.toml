[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https: blob: res.cloudinary.com; media-src 'self' https: blob: res.cloudinary.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://clothing-store-backend-51k7.onrender.com https://api.razorpay.com https://api.cloudinary.com; frame-src https://api.razorpay.com https://checkout.razorpay.com;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

